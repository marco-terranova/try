<ion-header class="ion-no-border">
  <ion-toolbar class="peek-toolbar">
    <div class="header-inner">
      <div class="header-top">
        <div class="header-greet">
          <img src="assets/icon/logoTitolo1.png" class="header-logo" alt="PeekBox" (click)="goBack()" style="cursor: pointer;" />
          <h1 class="header-greeting">GESTIONE <span class="nome-verde">UTENTI</span></h1>
        </div>
        <div class="users-counter">
          <ion-icon name="people"></ion-icon>
          <span>{{ utenti.length }} Utenti</span>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="admin-dashboard-wrapper">

    <!-- LISTA UTENTI -->
    <div class="users-list-container">

      <div
        class="user-premium-card"
        *ngFor="let utente of utenti"
      >

        <!-- IDENTITÀ -->
        <div class="user-identity">
          <div class="avatar-circle">
            {{ utente.email?.charAt(0)?.toUpperCase() }}
          </div>
          <div class="user-details">
            <h3>
              {{ utente.email }}
              <span class="role-badge admin" *ngIf="utente.is_admin">Admin</span>
              <span class="role-badge personal" *ngIf="utente.piano === 'personal'">Personal</span>
              <span class="role-badge business" *ngIf="utente.piano === 'business'">Business</span>
            </h3>
            <p>{{ utente.email }}</p>
          </div>
        </div>

        <!-- STATISTICHE -->
        <div class="user-stats-pills">
          <div class="stat-pill">
            <ion-icon name="cube-outline"></ion-icon>
            <div class="stat-data">
              <strong>{{ utente.num_armadi ?? 0 }}</strong>
              <span>Armadi</span>
            </div>
          </div>
          <div class="stat-pill">
            <ion-icon name="layers-outline"></ion-icon>
            <div class="stat-data">
              <strong>{{ utente.num_box ?? 0 }}</strong>
              <span>Box</span>
            </div>
          </div>
          <div class="stat-pill">
            <ion-icon name="pricetag-outline"></ion-icon>
            <div class="stat-data">
              <strong>{{ utente.num_oggetti ?? 0 }}</strong>
              <span>Oggetti</span>
            </div>
          </div>
        </div>

        <!-- AZIONI -->
        <div class="user-actions">
          <button
            class="btn-delete-ghost"
            (click)="eliminaUtente(utente.id)"
            title="Elimina utente"
          >
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>

      </div>

    </div>
  </div>
</ion-content>
