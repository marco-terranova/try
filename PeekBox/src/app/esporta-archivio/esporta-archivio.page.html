<ion-content class="bg-soft">
  <div class="page-wrapper">

    <!-- ── Header compatto: Logo + Titolo centro + Genera dx ── -->
    <div class="top-compact-bar">
      <div class="logo-group">
        <img src="assets/icon/logoTitolo1.png" alt="PeekBox" class="logo-peek">
      </div>

      <div class="title-group">
        <h2>Esporta Archivio</h2>
        <p>Genera un report completo o parziale.</p>
      </div>

      <button class="btn-export-top-right"
              [disabled]="!isFormValid() || isExporting"
              (click)="generaReport()">
        <ion-icon name="sparkles" *ngIf="!isExporting"></ion-icon>
        <ion-spinner name="crescent" *ngIf="isExporting"></ion-spinner>
        <span>{{ isExporting ? 'Generazione...' : 'Genera Report' }}</span>
      </button>
    </div>

    <!-- ── Plancia 2 colonne (nuova griglia grande) ── -->
    <div class="export-plancia-grid">

      <!-- COLONNA SX: filtri scope -->
      <div class="quadrante-esporta-card">
        <div class="panel-header">
          <ion-icon name="filter-circle-outline" class="text-azzurro"></ion-icon>
          <h3>Cosa vuoi esportare?</h3>
        </div>

        <div class="filter-group">

          <label class="radio-option">
            <input type="radio" name="scope" value="tutto" [(ngModel)]="exportScope">
            <span class="custom-radio"></span>
            <div class="option-text">
              <strong>Intero Archivio</strong>
              <span>Tutte le box e tutti gli articoli salvati.</span>
            </div>
          </label>

          <label class="radio-option">
            <input type="radio" name="scope" value="attive" [(ngModel)]="exportScope">
            <span class="custom-radio"></span>
            <div class="option-text">
              <strong>Solo Box Attive</strong>
              <span>Esclude il cestino e i pacchi in transito.</span>
            </div>
          </label>

        </div>
      </div>

      <!-- COLONNA DX: selezione formato -->
      <div class="quadrante-esporta-card">
        <div class="panel-header">
          <ion-icon name="document-text-outline" class="text-verde"></ion-icon>
          <h3>Scegli il formato</h3>
        </div>

        <div class="format-cards-container">

          <div class="format-card"
               [class.active]="exportFormat === 'pdf'"
               (click)="setFormat('pdf')">
            <ion-icon name="document-outline" class="format-icon pdf-color"></ion-icon>
            <strong>PDF</strong>
          </div>

          <div class="format-card"
               [class.active]="exportFormat === 'csv'"
               (click)="setFormat('csv')">
            <ion-icon name="grid-outline" class="format-icon csv-color"></ion-icon>
            <strong>CSV / Excel</strong>
          </div>

          <div class="format-card"
               [class.active]="exportFormat === 'json'"
               (click)="setFormat('json')">
            <ion-icon name="code-slash-outline" class="format-icon json-color"></ion-icon>
            <strong>JSON (Backup)</strong>
          </div>

        </div>
      </div>

    </div>

  </div>
</ion-content>

<!-- FLOATING BOTTOM NAV — identica alla homepage -->
<div class="floating-nav">
  <div class="nav-glow"></div>

  <div class="nav-item" (click)="vaiHome()">
    <ion-icon name="home"></ion-icon>
    <span>Home</span>
  </div>

  <div class="nav-item" (click)="navTo('/box-ricevute')">
    <ion-icon name="share-social-outline"></ion-icon>
    <span>Condividi</span>
  </div>

  <div class="nav-fab-wrapper">
    <button class="nav-fab" (click)="navTo('/crea-box')">
      <ion-icon name="add"></ion-icon>
    </button>
  </div>

  <div class="nav-item" (click)="navTo('/scan-qr')">
    <ion-icon name="qr-code-outline"></ion-icon>
    <span>Scan</span>
  </div>

  <div class="nav-item" (click)="navTo('/area-personale')">
    <div class="avatar-circle-nav">
      {{ nomeUtente ? nomeUtente.charAt(0).toUpperCase() : 'U' }}
    </div>
    <span>Profilo</span>
  </div>
</div>
