<ion-content class="geo-content">

  <!-- BACKDROP BLURRED -->
  <div class="geo-backdrop" (click)="chiudi()"></div>

  <!-- DIALOG COMPATTO MODALE -->
  <div class="geo-dialog">

    <!-- HEADER DIALOG -->
    <div class="geo-header">
      <button class="btn-close" (click)="chiudi()">
        <ion-icon name="close-outline"></ion-icon>
      </button>
      <h2>CONFIGURAZIONE GEOFENCE</h2>
      <div class="geo-status-badge" [class.active]="hasGeofence && attivo">
        <span *ngIf="hasGeofence && attivo">🛡️ ATTIVO</span>
        <span *ngIf="!(hasGeofence && attivo)" style="display: flex; align-items: center; justify-content: center; gap: 4px; line-height: 1;">
          <ion-icon name="warning" style="font-size: 0.85rem; margin-top: -1px;"></ion-icon>
          <span style="display: inline-block;">DISATTIVO</span>
        </span>
      </div>
    </div>

    <!-- BODY DIALOG -->
    <div class="geo-body">

      <!-- SEZIONE MAPPA / GPS (Leaflet) -->
      <div class="geo-section geo-section--map">
        <div #mapContainer class="leaflet-map"></div>
        <div class="map-overlay-bar">
          <button class="btn-gps-main" (click)="usaPosizioneCorrcome()" [disabled]="isGettingGps">
            <ion-spinner *ngIf="isGettingGps" name="crescent"></ion-spinner>
            <span *ngIf="!isGettingGps">USA GPS</span>
          </button>
          <button class="btn-gps-main" (click)="apriInMappa()" *ngIf="latitudine !== null">
            <ion-icon name="location-outline"></ion-icon>
            <span>MAPS</span>
          </button>
        </div>
      </div>

      <!-- SEZIONE COORDINATE E RAGGIO -->
      <div class="geo-section">
        <div class="coords-row">
          <div class="coord-field">
            <label>LATITUDINE</label>
            <input type="number" [(ngModel)]="latitudine" placeholder="0.000000" step="0.000001">
          </div>
          <div class="coord-field">
            <label>LONGITUDINE</label>
            <input type="number" [(ngModel)]="longitudine" placeholder="0.000000" step="0.000001">
          </div>
        </div>

        <div class="range-field">
          <div class="range-header">
            <label>RAGGIO DI TOLLERANZA</label>
            <span class="range-val">{{ raggioLabel }}</span>
          </div>
          <ion-range min="10" max="5000" step="10" [(ngModel)]="raggioM" (ionChange)="onRaggioChange()" class="geo-range"></ion-range>
        </div>
      </div>

      <!-- SEZIONE TOGGLE E AZIONI -->
      <div class="geo-section geo-section--actions">
        <div class="toggle-field">
          <div class="toggle-info">
            <span class="toggle-title">Monitoraggio Attivo</span>
            <span class="toggle-desc">Ricevi alert se il box esce dal perimetro</span>
          </div>
          <ion-toggle [(ngModel)]="attivo" class="toggle-brand"></ion-toggle>
        </div>

        <div class="btns-row">
          <button class="btn-save" (click)="salvaGeofence()" [disabled]="isSaving || latitudine === null">
            <ion-icon name="save-outline" *ngIf="!isSaving"></ion-icon>
            <ion-spinner name="crescent" *ngIf="isSaving"></ion-spinner>
            <span>{{ hasGeofence ? 'AGGIORNA' : 'IMPOSTA' }}</span>
          </button>
          <button class="btn-del" *ngIf="hasGeofence" (click)="confermaElimina()">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </div>

    </div>

    <!-- FOOTER INFO -->
    <div class="geo-footer">
      <ion-icon name="information-circle-outline"></ion-icon>
      <p>Il sistema rileva la posizione GPS ad ogni scansione QR per garantire la sicurezza degli asset.</p>
    </div>

  </div>

</ion-content>
